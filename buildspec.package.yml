version: 0.2

env:
  shell: bash

phases:
  install:
    commands:
      - set -euo pipefail
      - yum install -y clang gcc gcc-c++ make protobuf-compiler protobuf-devel tar gzip
      - RUST_CHANNEL="$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)"
      - curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain "${RUST_CHANNEL}"
      - source "$HOME/.cargo/env"
  pre_build:
    commands:
      - set -euo pipefail
      - source "$HOME/.cargo/env"
      - cargo fetch --locked
  build:
    commands:
      - set -euo pipefail
      - source "$HOME/.cargo/env"
      - cargo build --release --locked -p omnigraph-server -p omnigraph-cli
      - mkdir -p dist release
      - install -m 0755 target/release/omnigraph-server dist/omnigraph-server
      - install -m 0755 target/release/omnigraph dist/omnigraph
      - tar -C dist -czf "release/omnigraph-linux-x86_64.tar.gz" omnigraph-server omnigraph
      - |
        source_sha="${OMNIGRAPH_SOURCE_VERSION:-${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}}"
        build_prefix="builds/${source_sha}"
        artifact_prefix="${build_prefix}"
        if [[ -n "${OMNIGRAPH_ARTIFACT_BUCKET:-}" ]]; then
          artifact_prefix="s3://${OMNIGRAPH_ARTIFACT_BUCKET}/${build_prefix}"
        fi
        image_ref=""
        image_digest=""
        if [[ -n "${OMNIGRAPH_ECR_REPOSITORY:-}" ]]; then
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          image_tag="${source_sha}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${registry}"
          docker build -t "${registry}/${OMNIGRAPH_ECR_REPOSITORY}:${image_tag}" .
          docker push "${registry}/${OMNIGRAPH_ECR_REPOSITORY}:${image_tag}"
          image_digest="$(aws ecr describe-images \
            --repository-name "${OMNIGRAPH_ECR_REPOSITORY}" \
            --image-ids "imageTag=${image_tag}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          image_ref="${registry}/${OMNIGRAPH_ECR_REPOSITORY}@${image_digest}"
        fi
        export OMNIGRAPH_SOURCE_SHA="${source_sha}"
        export OMNIGRAPH_ARTIFACT_PREFIX="${artifact_prefix}"
        export OMNIGRAPH_IMAGE_REF="${image_ref}"
        export OMNIGRAPH_IMAGE_DIGEST="${image_digest}"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        def optional(name: str):
            value = os.environ.get(name, "").strip()
            return value or None

        payload = {
            "source_sha": os.environ["OMNIGRAPH_SOURCE_SHA"],
            "image_ref": optional("OMNIGRAPH_IMAGE_REF"),
            "image_digest": optional("OMNIGRAPH_IMAGE_DIGEST"),
            "artifact_prefix": os.environ["OMNIGRAPH_ARTIFACT_PREFIX"],
        }
        Path("release/image.json").write_text(json.dumps(payload, separators=(",", ":")) + "\n")
        PY
      - (cd release && sha256sum omnigraph-linux-x86_64.tar.gz > SHA256SUMS)
      - |
        source_sha="${OMNIGRAPH_SOURCE_VERSION:-${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}}"
        if [[ -n "${OMNIGRAPH_ARTIFACT_BUCKET:-}" ]]; then
          build_prefix="builds/${source_sha}"
          aws s3 cp "release/omnigraph-linux-x86_64.tar.gz" "s3://${OMNIGRAPH_ARTIFACT_BUCKET}/${build_prefix}/omnigraph-linux-x86_64.tar.gz"
          aws s3 cp "release/SHA256SUMS" "s3://${OMNIGRAPH_ARTIFACT_BUCKET}/${build_prefix}/SHA256SUMS"
          aws s3 cp "release/image.json" "s3://${OMNIGRAPH_ARTIFACT_BUCKET}/${build_prefix}/image.json"
        fi

artifacts:
  files:
    - release/omnigraph-linux-x86_64.tar.gz
    - release/SHA256SUMS
    - release/image.json
  discard-paths: yes
  name: $OMNIGRAPH_SOURCE_VERSION
