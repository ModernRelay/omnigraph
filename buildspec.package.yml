version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      docker: 24
    commands:
      - set -euo pipefail
      - yum install -y clang gcc gcc-c++ make protobuf-compiler protobuf-devel tar gzip
      - curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain 1.91.0
      - source "$HOME/.cargo/env"
  pre_build:
    commands:
      - set -euo pipefail
      - source "$HOME/.cargo/env"
      - cargo fetch --locked
  build:
    commands:
      - set -euo pipefail
      - source "$HOME/.cargo/env"
      - cargo build --release --locked -p omnigraph-server -p omnigraph-cli
      - mkdir -p dist
      - install -m 0755 target/release/omnigraph-server dist/omnigraph-server
      - install -m 0755 target/release/omnigraph dist/omnigraph
      - tar -C dist -czf "dist/omnigraph-linux-x86_64.tar.gz" omnigraph-server omnigraph
      - printf '{"image":null,"tag":null}\n' > dist/image.json
      - |
        if [[ -n "${OMNIGRAPH_ECR_REPOSITORY:-}" ]]; then
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          image_tag="${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${registry}"
          docker build -t "${registry}/${OMNIGRAPH_ECR_REPOSITORY}:${image_tag}" .
          docker push "${registry}/${OMNIGRAPH_ECR_REPOSITORY}:${image_tag}"
          printf '{"image":"%s","tag":"%s"}\n' "${registry}/${OMNIGRAPH_ECR_REPOSITORY}" "${image_tag}" > dist/image.json
        fi
      - (cd dist && sha256sum omnigraph-linux-x86_64.tar.gz > SHA256SUMS)

artifacts:
  files:
    - dist/omnigraph-linux-x86_64.tar.gz
    - dist/SHA256SUMS
    - dist/image.json
  discard-paths: no
