name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    permissions:
      contents: read
    uses: ModernRelay/.github/.github/workflows/omnigraph-ci.yml@v1
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
