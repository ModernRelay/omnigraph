name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ModernRelay/omnigraph-platform/.github/workflows/reusable-ci.yml@main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
    secrets: inherit
