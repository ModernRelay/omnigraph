name: Deploy Preview Server

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref whose packaged image should be deployed when image_ref is omitted
        required: false
        default: main
      image_ref:
        description: Full container image reference to deploy. Leave empty to use <ECR repo URL>:<commit sha>.
        required: false
        default: ""

concurrency:
  group: deploy-preview-server
  cancel-in-progress: false

jobs:
  deploy_preview_server:
    name: Deploy Preview Server
    if: ${{ vars.AWS_ROLE_TO_ASSUME != '' && vars.AWS_REGION != '' && vars.AWS_EC2_INSTANCE_ID != '' && vars.AWS_SERVER_IMAGE_PARAM != '' && vars.AWS_ECR_REPOSITORY_URL != '' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_EC2_INSTANCE_ID: ${{ vars.AWS_EC2_INSTANCE_ID }}
      AWS_SERVER_IMAGE_PARAM: ${{ vars.AWS_SERVER_IMAGE_PARAM }}
      AWS_ECR_REPOSITORY_URL: ${{ vars.AWS_ECR_REPOSITORY_URL }}
      AWS_SERVER_TOKENS_PATH: ${{ vars.AWS_SERVER_TOKENS_PATH }}
      AWS_ENDPOINT_URL: ${{ vars.AWS_ENDPOINT_URL }}
      AWS_BEARER_TOKEN_PARAM: ${{ vars.AWS_BEARER_TOKEN_PARAM }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve source ref
        id: source_ref
        env:
          WORKFLOW_SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          source_ref="${GITHUB_SHA}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${WORKFLOW_SOURCE_REF}" ]]; then
            source_ref="${WORKFLOW_SOURCE_REF}"
          fi
          echo "value=${source_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        if: ${{ github.event.inputs.image_ref == '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source_ref.outputs.value }}
          fetch-depth: 1

      - name: Resolve image reference
        id: image
        env:
          INPUT_IMAGE_REF: ${{ github.event.inputs.image_ref }}
        run: |
          image_ref="${INPUT_IMAGE_REF}"
          if [[ -z "${image_ref}" ]]; then
            commit_sha="$(git rev-parse HEAD)"
            image_ref="${AWS_ECR_REPOSITORY_URL}:${commit_sha}"
          fi

          image_tag="${image_ref##*:}"
          repo_name="${AWS_ECR_REPOSITORY_URL##*/}"

          echo "value=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo_name}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${image_ref}"

      - name: Verify image exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name "${{ steps.image.outputs.repo }}" \
            --image-ids "imageTag=${{ steps.image.outputs.tag }}" \
            >/dev/null

      - name: Update active server image parameter
        run: |
          aws ssm put-parameter \
            --name "${AWS_SERVER_IMAGE_PARAM}" \
            --type String \
            --value "${{ steps.image.outputs.value }}" \
            --overwrite \
            >/dev/null

      - name: Restart preview server on EC2
        id: restart
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          tokens_path = os.environ.get("AWS_SERVER_TOKENS_PATH") or "/omnigraph/server/tokens/"
          commands = [
              "set -euo pipefail",
              "IMAGE_REF=$(aws ssm get-parameter --name \"$AWS_SERVER_IMAGE_PARAM\" --region \"$AWS_REGION\" --query 'Parameter.Value' --output text)",
              "if grep -q '^OMNIGRAPH_SERVER_IMAGE=' /etc/omnigraph/server.env; then "
              "sed -i \"s|^OMNIGRAPH_SERVER_IMAGE=.*|OMNIGRAPH_SERVER_IMAGE=${IMAGE_REF}|\" /etc/omnigraph/server.env; "
              "else printf '\\nOMNIGRAPH_SERVER_IMAGE=%s\\n' \"$IMAGE_REF\" >> /etc/omnigraph/server.env; fi",
              "TOKENS_JSON=$(aws ssm get-parameters-by-path --path \"" + tokens_path + "\" --with-decryption --recursive --region \"$AWS_REGION\" --query 'Parameters[*].[Name,Value]' --output json | python3 - \"" + tokens_path + "\" <<'PY2'\n"
              "import json\n"
              "import sys\n"
              "prefix = sys.argv[1].rstrip('/') + '/'\n"
              "items = json.load(sys.stdin)\n"
              "tokens = {}\n"
              "for name, value in items:\n"
              "    if name.startswith(prefix):\n"
              "        actor = name[len(prefix):].strip()\n"
              "        if actor:\n"
              "            tokens[actor] = value\n"
              "print(json.dumps(tokens, separators=(\",\", \":\")))\n"
              "PY2\n"
              ")",
              "printf '%s\\n' \"$TOKENS_JSON\" >/etc/omnigraph/bearer-tokens.json",
              "chmod 600 /etc/omnigraph/bearer-tokens.json",
              "if grep -q '^OMNIGRAPH_SERVER_BEARER_TOKENS_FILE=' /etc/omnigraph/server.env; then "
              "sed -i 's|^OMNIGRAPH_SERVER_BEARER_TOKENS_FILE=.*|OMNIGRAPH_SERVER_BEARER_TOKENS_FILE=/etc/omnigraph/bearer-tokens.json|' /etc/omnigraph/server.env; "
              "else printf '\\nOMNIGRAPH_SERVER_BEARER_TOKENS_FILE=/etc/omnigraph/bearer-tokens.json\\n' >> /etc/omnigraph/server.env; fi",
              "systemctl enable --now docker",
              "systemctl daemon-reload",
              "systemctl enable omnigraph-server.service",
              "systemctl restart omnigraph-server.service",
              "for i in $(seq 1 60); do if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then break; fi; sleep 1; done",
              "systemctl is-active omnigraph-server.service",
              "curl -fsS http://127.0.0.1:8080/healthz",
              "docker ps --filter name=omnigraph-server --format '{{.Image}} {{.Status}}'",
          ]

          payload = {"commands": commands}
          path = Path(os.environ["RUNNER_TEMP"]) / "deploy-preview-server-ssm.json"
          path.write_text(json.dumps(payload))
          print(path)
          PY
          command_id="$(aws ssm send-command \
            --instance-ids "${AWS_EC2_INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --comment "Deploy omnigraph preview server image" \
            --parameters "file://${RUNNER_TEMP}/deploy-preview-server-ssm.json" \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=${command_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for restart completion
        run: |
          command_id="${{ steps.restart.outputs.command_id }}"
          while true; do
            status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${AWS_EC2_INSTANCE_ID}" \
              --query 'Status' \
              --output text)"
            echo "SSM status: ${status}"
            case "${status}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${AWS_EC2_INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text
                break
                ;;
              Cancelled|TimedOut|Failed|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${AWS_EC2_INSTANCE_ID}" \
                  --query '{stdout:StandardOutputContent,stderr:StandardErrorContent}' \
                  --output json
                exit 1
                ;;
            esac
            sleep 5
          done

      - name: Smoke test public health
        if: ${{ env.AWS_ENDPOINT_URL != '' }}
        run: |
          curl -fsS "${AWS_ENDPOINT_URL}/healthz"

      - name: Smoke test authenticated snapshot
        if: ${{ env.AWS_ENDPOINT_URL != '' && env.AWS_BEARER_TOKEN_PARAM != '' }}
        run: |
          token="$(aws ssm get-parameter \
            --name "${AWS_BEARER_TOKEN_PARAM}" \
            --with-decryption \
            --region "${AWS_REGION}" \
            --query 'Parameter.Value' \
            --output text)"
          curl -fsS \
            -H "Authorization: Bearer ${token}" \
            "${AWS_ENDPOINT_URL}/snapshot" \
            > "${RUNNER_TEMP}/snapshot.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          snapshot = json.loads(Path(os.environ["RUNNER_TEMP"], "snapshot.json").read_text())
          print(json.dumps({
              "branch": snapshot.get("branch"),
              "manifest_version": snapshot.get("manifest_version"),
              "table_count": len(snapshot.get("tables", [])),
          }))
          PY
