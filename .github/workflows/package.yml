name: Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to package in CodeBuild
        required: false
        default: main

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    if: ${{ vars.AWS_CODEBUILD_PACKAGE_PROJECT != '' && vars.AWS_ROLE_TO_ASSUME != '' && vars.AWS_REGION != '' && vars.AWS_ARTIFACT_BUCKET != '' }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    uses: ModernRelay/.github/.github/workflows/omnigraph-package.yml@v1
    with:
      repository: ${{ github.repository }}
      source_ref: ${{ github.event.inputs.source_ref || github.sha }}
      aws_region: ${{ vars.AWS_REGION }}
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
      aws_codebuild_package_project: ${{ vars.AWS_CODEBUILD_PACKAGE_PROJECT }}
      aws_artifact_bucket: ${{ vars.AWS_ARTIFACT_BUCKET }}
      omnigraph_ecr_repository: omnigraph-server
